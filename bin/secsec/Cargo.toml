[package]
name = "secsec"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "secsec CLI — the single static binary (secsec-Design.md §11, §12)."

[[bin]]
name = "secsec"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
secsec-server = { path = "../../crates/secsec-server" }
secsec-store = { path = "../../crates/secsec-store" }
secsec-transport = { path = "../../crates/secsec-transport" }
secsec-client = { path = "../../crates/secsec-client" }
secsec-sig = { path = "../../crates/secsec-sig" }
secsec-sync = { path = "../../crates/secsec-sync" }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
getrandom = "0.3"
blake3 = "1"
quinn = { version = "0.11", default-features = false, features = ["runtime-tokio", "rustls-ring", "log"] }
rcgen = "0.13"
rpassword = "7"              # no-echo TTY prompt for an encrypted ~/.ssh/id_ed25519 passphrase
zeroize = "1"                # wipe the typed passphrase from memory after decrypting the key
tempfile = "3"               # throwaway object store for `log`/`restore` (avoids the synced-cache lock)
